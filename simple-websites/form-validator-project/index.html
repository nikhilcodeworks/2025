<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form validator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="" id="myform">
        <label for="name">Name</label>
        <input id="name" placeholder="Enter your name" type="text">
        <span class="error"></span>
        <label for="email">Email</label>
        <input id="email" placeholder="Enter your email" type="text">
        <span class="error"></span>
        <label for="p1">Enter Password</label>
        <input id="p1" placeholder="Enter-password" type="text">
        <span class="error"></span>
        <label for="p2">Conform Password</label>
        <input id="p2" placeholder="Re-enter password" type="text">
        <span class="error"></span>
        <button id="submitbtn" type="submit">Submit</button>
    </form>
    <script src="app.js"></script>   
</body>
</html>
